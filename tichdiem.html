<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông Tin Tài Khoản</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="tichdiem.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <!-- Nội dung cho div bên trái -->
        <p>Bên trái</p>
      </div>
      <div class="right">
        <div class="tichdiem">
          <div class="coin-display">
            <!-- Icon Bootstrap và văn bản được đặt trong Flexbox -->
            <i class="bi bi-coin"></i>
            <p>Điểm khả dụng: 0</p>
          </div>

          <div class="div2">
            <!-- Lịch sử tích điểm -->
            <div class="box">
              <i class="bi bi-clock-history"></i>
              <p>Lịch sử tích điểm</p>
            </div>

            <!-- Đổi quà -->
            <div class="box">
              <i class="bi bi-gift"></i>
              <p>Đổi quà</p>
            </div>

            <!-- Quản lý đổi quà -->
            <div class="box">
              <i class="bi bi-box-seam"></i>
              <p>Quản lý đổi quà</p>
            </div>
          </div>

          <div>
            <p><strong>Quà nổi bật: </strong></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
